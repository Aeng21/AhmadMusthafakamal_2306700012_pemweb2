<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="assets/css/login.css">
    <link rel="shortcut icon" href="assets/img/logo-um.png" type="image/x-icon">
</head>

<body class="flex justify-center item-center">
    <!-- LOGIN -->
    <div class="login-card flex justify-center">
        <div class="login-card__card-logo flex direction-col justify-center item-center">
            <img class="login-card__img-logo-um" src="assets/img/logo-um.png" alt="">
            <p>SMART</p>
        </div>

        <div class="login-card__card-form text-center content-center">
            <label for="nim">NPM / NIM
                <br>
                <input type="text" name="nim" class="login-card__form">
            </label>
            <br>


            <label for="password"> Password
                <br>
                <input type="password" name="password" class="login-card__form">
            </label>
            <br>

            <a href="">
                <button class="login-card__btn-form">Login</button>
            </a>
        </div>
    </div>

</body>

</html>
